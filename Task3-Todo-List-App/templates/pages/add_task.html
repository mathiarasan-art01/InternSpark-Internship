{% extends "layouts/base.html" %}
{% block title %}Add task · TaskNest{% endblock %}
{% block content %}
<section class="glass p-4 p-md-5 mx-auto" style="max-width: 720px">
  <h1 class="section-title">＋ New task</h1>
  <form method="post" class="row g-3 mt-1">
    <div class="col-12">
      <label class="form-label">Title</label>
      <input name="title" class="form-control" required maxlength="120" autofocus />
    </div>
    <div class="col-md-6">
      <label class="form-label">Category</label>
      <select name="category" class="form-select">
        {% for c in categories %}<option>{{ c }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Priority</label>
      <select name="priority" class="form-select">
        {% for p in priorities %}<option {% if p=='Medium' %}selected{% endif %}>{{ p }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Due date</label>
      <input type="date" name="due_date" class="form-control" />
    </div>
    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="4" placeholder="Optional notes…"></textarea>
    </div>
    <div class="col-12 d-flex justify-content-between">
      <a href="{{ url_for('tasks.dashboard') }}" class="btn btn-ghost">← Cancel</a>
      <button class="btn btn-primary-grad">Add task</button>
    </div>
  </form>
</section>
{% endblock %}
